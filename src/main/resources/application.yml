spring:
  application:
    name: tp01-backend-hwt
  datasource:
    url:  ${URL_DB}
    username: ${USERNAME_DB}
    password : ${PASSWORD_DB}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      continue-on-error: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MI_CORREO_PERSONAL}
    password: ${MI_PASSWORD_DE_APLICACION}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
logging:
  level:
    com:
      fasterxml:
        jackson: DEBUG
    org:
      springframework:
        web:
          servlet:
            mvc:
              support:
                DefaultHandlerExceptionResolver: DEBUG
              method:
                annotation:
                  RequestResponseBodyMethodProcessor: DEBUG

JWT_SECRET: ${JWT_SECRET}
JWT_EXPIRATION: ${JWT_EXPIRATION}

app:
  security:
    db-key: ${DB_ENCRYPTION_KEY:u7F9kPzQwX3h9L27oP0qR}
